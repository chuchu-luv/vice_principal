        ['13:00','14:50','선임 교감과의 대화','승지관 202호','초등 교감 전윤주 외 3인','토의·대화','교감의 역할과 학교문화, 리더십 경험 공유',['교감의 역할과 학교문화 공유','바람직한 리더십 사례 공유']],
        ['15:00','15:50','분임활동 8','분임토의실','','분임','분임별 토의 및 보고서 작성',[]]
      ]},
      {date:'2026-08-07', hours:5, mode:'대면·수료', location:'충남교육청교육연수원', items:[
        ['10:00','11:50','분임발표 9·10','승지관 202호','','발표','분임별 결과 발표',[]],
        ['12:00','12:50','점심','연수원 식당','','식사','',[]],
        ['13:00','14:50','행복한 교육자, 관리자로 살기','승지관 301호','전 원장 김준태','강의','행복한 교직 생활 설계와 교육자의 마음 다지기',['행복한 교직 생활 설계','교육자의 마음 다지기']],
        ['15:00','15:50','공감과 격려의 하모니','승지관 301호','너울','공연','닫는 문화예술 공연',[]],
        ['16:00','16:50','수료식','승지관 301호','','행사','수료식 및 설문조사',[]]
      ]}
    ].map((day,di)=>({...day,label:formatKDate(day.date),items:day.items.map((x,ii)=>({id:`${di}-${ii}`,start:x[0],end:x[1],title:x[2],location:x[3],speaker:x[4],type:x[5],detail:x[6],points:x[7]}))}));

    const REMOTE_CONTENTS = [
      ['디지털시민성의 이해','디지털 시민성의 의미와 교육의 방향','3000021312'],
      ['이주배경학생 이해','다문화 사회로의 변화와 다문화 이해 교육의 중요성','3000021991'],
      ['장애이해교육','장애이해교육 운영의 이해와 실제','1000123030'],
      ['학생인권교육의 이해','사례로 보는 학생인권과 교권의 규범적 이해','1000126206'],
      ['아동학대 신고의무자 교육','아동학대 예방 및 긴급복지신고','3000021857'],
      ['긴급복지 신고의무 교육','긴급복지 신고의무 교육','3000021287']
    ];

    const state = {
      selectedDate:'', calendarDate:'', calendarMonth:'2026-07', meals:{}, mealLoaded:false, mealError:'', mealUpdatedAt:''
    };
    const modal = document.querySelector('#modal');
    const esc = (s='') => String(s).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const timeToNum = (t='') => {const [h,m]=String(t).split(':').map(Number);return (h||0)*60+(m||0)};
    const dayByDate = date => DAYS.find(d=>d.date===date);
    const scheduleDates = () => DAYS.map(d=>d.date);

    function formatKDate(date){
      const [y,m,d]=date.split('-').map(Number); const yo=['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()];
      return `${m}.${d}(${yo})`;
    }
    function kstNow(){
      const parts = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hourCycle:'h23'}).formatToParts(new Date());
      const obj={}; parts.forEach(p=>obj[p.type]=p.value);
      return {date:`${obj.year}-${obj.month}-${obj.day}`,minutes:Number(obj.hour)*60+Number(obj.minute)};
    }
    function chooseInitialDate(){
      const today=kstNow().date; return scheduleDates().find(d=>d>=today) || scheduleDates()[scheduleDates().length-1];
    }
    function statusOf(day,item){
      const now=kstNow(); if(day.date<now.date)return 'past'; if(day.date>now.date)return 'future';
      const st=timeToNum(item.start), en=timeToNum(item.end); if(now.minutes>=st&&now.minutes<=en)return 'now'; if(now.minutes>en)return 'past'; return 'future';
    }
    function typeClass(item){
      if(item.type==='식사')return 'meal'; if(item.type==='이동')return 'move'; if(['행사','공연'].includes(item.type))return 'event'; return '';
    }
    function shortPlace(place=''){
      return String(place).replace('충남교육청교육연수원','연수원').replace('충청남도교육청교육연수원','연수원').replace('실시간 비대면','비대면').replace('스플라스 리솜 스페이스 A','리솜 A');
    }
    function openModal(title,html){document.querySelector('#modalTitle').textContent=title;document.querySelector('#modalBody').innerHTML=html;modal.showModal()}
    function rowHtml(day,item,index){
      const st=statusOf(day,item), special=typeClass(item), tone=special?'':`tone${index%5}`, now=st==='now'&&item.type!=='식사';
      const tag=item.type&&item.type!=='강의'?`<span class="tag">${esc(item.type)}</span>`:'';
      return `<button class="lesson ${tone} ${special} ${now?'now':''} ${st==='past'?'past':''}" data-id="${item.id}"><span class="time"><b>${esc(item.start)}</b><i>~</i><b>${esc(item.end)}</b></span><span class="lesson-main"><span class="lesson-title">${now?'<span class="now-badge">진행 중</span>':''}${tag}${esc(item.title)}</span><span class="lesson-place">${esc(shortPlace(item.location))}</span></span></button>`;
    }
    function renderDateChips(){
      const el=document.querySelector('#dateChips'); el.innerHTML=DAYS.map(d=>`<button class="chip ${state.selectedDate===d.date?'active':''}" data-date="${d.date}">${d.label}</button>`).join('');
      el.querySelectorAll('[data-date]').forEach(b=>b.onclick=()=>{state.selectedDate=b.dataset.date;state.calendarDate=b.dataset.date;state.calendarMonth=b.dataset.date.slice(0,7);renderToday()});
      requestAnimationFrame(()=>el.querySelector('.chip.active')?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}));
    }
    function summaryHtml(day){return `<span><b>${day.hours}시간</b> · ${esc(day.location)}</span><span class="mode-badge">${esc(day.mode)}</span>`}
    function renderToday(){
      if(!state.selectedDate)state.selectedDate=chooseInitialDate(); const day=dayByDate(state.selectedDate); if(!day)return;
      const today=kstNow().date; document.querySelector('#statusText').textContent=day.date===today?'오늘 시간표':(day.date>today?'다음 연수일':'연수 일정');
      document.querySelector('#dayTitle').textContent=`${day.label} 시간표`; renderDateChips(); document.querySelector('#daySummary').innerHTML=summaryHtml(day);
      let count=0; document.querySelector('#todayList').innerHTML=day.items.map(item=>rowHtml(day,item,['식사','이동','행사','공연'].includes(item.type)?0:count++)).join('');
      document.querySelector('#hoursNote').innerHTML=`<b>계획 시수 ${day.hours}시간</b> · 수업 카드를 누르면 강사·장소·교수요목을 볼 수 있습니다.`;
    }
    function monthInfo(month){const [y,m]=month.split('-').map(Number);return {y,m,days:new Date(y,m,0).getDate(),first:new Date(y,m-1,1).getDay()}}
    function changeMonth(delta){const months=['2026-07','2026-08'];const i=months.indexOf(state.calendarMonth);const ni=Math.max(0,Math.min(months.length-1,i+delta));state.calendarMonth=months[ni];renderCalendar()}
    function renderCalendar(){
      const info=monthInfo(state.calendarMonth), today=kstNow().date, dates=new Set(scheduleDates()), ordered=scheduleDates();
      document.querySelector('#calendarTitle').textContent=`${info.y}년 ${info.m}월`; document.querySelector('#prevMonth').disabled=state.calendarMonth==='2026-07';document.querySelector('#nextMonth').disabled=state.calendarMonth==='2026-08';
      const dows=['일','월','화','수','목','금','토'];let html=dows.map((d,i)=>`<div class="dow ${i===0?'sun':''} ${i===6?'sat':''}">${d}</div>`).join('');
      for(let i=0;i<info.first;i++)html+='<button class="day empty" aria-hidden="true"></button>';
      for(let d=1;d<=info.days;d++){
        const date=`${info.y}-${String(info.m).padStart(2,'0')}-${String(d).padStart(2,'0')}`,dow=new Date(info.y,info.m-1,d).getDay(),has=dates.has(date),tone=Math.max(0,ordered.indexOf(date))%5;
        html+=`<button class="day ${dow===0?'sun':''} ${dow===6?'sat':''} ${has?`has tone${tone}`:''} ${date===today?'today':''} ${date===state.calendarDate?'selected':''}" ${has?`data-cal="${date}"`:''}>${d}${has?'<span class="dot"></span>':''}</button>`;
      }
      const cal=document.querySelector('#calendar');cal.innerHTML=html;cal.querySelectorAll('[data-cal]').forEach(b=>b.onclick=()=>{state.calendarDate=b.dataset.cal;state.selectedDate=b.dataset.cal;renderCalendar();renderCalendarList()});
    }
    function renderCalendarList(){
      if(!state.calendarDate)state.calendarDate=state.selectedDate||chooseInitialDate();const day=dayByDate(state.calendarDate);if(!day)return;
      document.querySelector('#allDaySummary').innerHTML=summaryHtml(day);let count=0;document.querySelector('#calendarList').innerHTML=day.items.map(item=>rowHtml(day,item,['식사','이동','행사','공연'].includes(item.type)?0:count++)).join('');
    }
    function findItem(id){for(const day of DAYS){const item=day.items.find(x=>x.id===id);if(item)return {day,item}}return null}
    function showDetail(day,item){
      if(item.type==='식사'){showMeal(day.date,'lunch');return}
      const points=item.points?.length?`<h4>주요 내용</h4><ul>${item.points.map(p=>`<li>${esc(p)}</li>`).join('')}</ul>`:'';
      openModal('수업 상세',`<span class="modal-label">${day.label} · ${esc(item.start)} ~ ${esc(item.end)}</span><h3>${esc(item.title)}</h3><dl class="detail-grid"><div><dt>장소</dt><dd>${esc(item.location||'-')}</dd></div><div><dt>강사</dt><dd>${esc(item.speaker||'-')}</dd></div><div><dt>연수 형태</dt><dd>${esc(item.type||'강의')}</dd></div><div><dt>일일 시수</dt><dd>${day.hours}시간</dd></div></dl>${item.detail?`<p>${esc(item.detail)}</p>`:''}${points}<p class="empty">※ 운영 상황에 따라 세부 일정·강의실·강사는 변경될 수 있습니다.</p>`);
    }
    function normalizeMenu(value){
      if(Array.isArray(value))return value.map(String).map(x=>x.trim()).filter(Boolean);
      if(value===null||value===undefined||value==='')return [];
      return String(value).split(/\n|\r|,\s*/).map(x=>x.trim()).filter(Boolean);
    }
    function mealForDate(date){
      const direct=state.meals?.[date];
      if(direct)return direct;
      const compact=String(date||'').replace(/\D/g,'');
      for(const [key,value] of Object.entries(state.meals||{})){
        const keyCompact=String(key).replace(/\D/g,'');
        if(keyCompact===compact || keyCompact.endsWith(compact.slice(4)))return value;
      }
      return {};
    }
    function showMeal(date=state.selectedDate,preferred='lunch'){
      const raw=mealForDate(date), labels={breakfast:'아침',lunch:'점심',dinner:'저녁'};
      const order=[preferred,'breakfast','lunch','dinner'].filter((v,i,a)=>a.indexOf(v)===i);
      let sections=order.map(type=>[type,normalizeMenu(raw?.[type])]).filter(([,menu])=>menu.length).map(([type,menu])=>`<section class="meal-section"><h4>${labels[type]||type}</h4><ul>${menu.map(m=>`<li>${esc(m)}</li>`).join('')}</ul></section>`).join('');
      if(!sections && (Array.isArray(raw)||typeof raw==='string')){
        const menu=normalizeMenu(raw); if(menu.length)sections=`<section class="meal-section"><ul>${menu.map(m=>`<li>${esc(m)}</li>`).join('')}</ul></section>`;
      }
      const emptyMessage=state.mealLoaded
        ? '<p class="empty">등록된 식단이 없습니다.</p>'
        : '<p class="empty">식단 정보를 확인하지 못했습니다.<br>잠시 후 다시 확인해 주세요.</p>';
      openModal(`${formatKDate(date)} 식단`,`<h3>오늘의 식단</h3>${sections||emptyMessage}<section class="allergy"><h4>알레르기 정보</h4><p>${ALLERGY}</p></section>`);
    }
    function renderGuide(){
      const guides=[
        ['overview','📘','연수 개요','기간·대상·총 100시간'],
        ['method','🗂️','연수 형태','원격 6 · 집합 91 · 과제 3시간'],
        ['place','📍','연수 장소','연수원·현장체험·원격 장소'],
        ['remote','💻','원격 콘텐츠','연수 기간 중 6개 과정 이수'],
        ['evaluation','📝','평가 안내','서술·논술·과제·보고서·근태']
      ];
      document.querySelector('#guideList').innerHTML=guides.map(([k,i,t,s])=>`<button class="guide" data-guide="${k}"><span class="guide-icon">${i}</span><span><span class="guide-title">${t}</span><span class="guide-sub">${s}</span></span></button>`).join('');
      document.querySelectorAll('[data-guide]').forEach(b=>b.onclick=()=>showGuide(b.dataset.guide));
    }
    function showGuide(key){
      if(key==='overview')return openModal('연수 개요',`<span class="modal-label">2026 초등 교감 자격연수</span><h3>연수 개요</h3><section class="info-card"><p><b>기간</b> · 2026. 7. 16.(목)~8. 7.(금), 16일</p><p><b>대상</b> · 2026 초등 교감 자격연수 대상자 76명</p><p><b>총시수</b> · 100시간</p><p><b>형태</b> · 혼합연수</p></section><p>성찰, 리더십, 교무 운영, 교육 지원, 업무조정 및 갈등관리 역량 함양을 목표로 합니다.</p>`);
      if(key==='method')return openModal('연수 형태',`<h3>총 100시간</h3><table class="table"><thead><tr><th>형태</th><th>시간</th></tr></thead><tbody><tr><td>원격 콘텐츠</td><td>6시간</td></tr><tr><td>집합연수</td><td>91시간</td></tr><tr><td>└ 실시간 비대면</td><td>11시간</td></tr><tr><td>└ 대면</td><td>80시간</td></tr><tr><td>과제수행</td><td>3시간</td></tr><tr><td><b>합계</b></td><td><b>100시간</b></td></tr></tbody></table><p class="empty">일자별 시간표 94시간과 원격 콘텐츠 6시간을 합해 총 100시간입니다.</p>`);
      if(key==='place')return openModal('연수 장소',`<h3>주요 장소</h3><section class="info-card"><h4>집합연수</h4><p>충남교육청교육연수원 대강당, 승지관 201·301호, 지능정보연수실, 분임토의실 등</p></section><section class="info-card"><h4>현장체험연수</h4><p>홍성 일원: 홍동초, 햇살배움터, 진로융합교육원, 스플라스 리솜 등</p></section><section class="info-card"><h4>원격연수</h4><p>소속교(기관) 또는 자택</p></section>`);
      if(key==='remote')return openModal('원격 콘텐츠',`<span class="modal-label">연수 기간 중 · 총 6시간</span><h3>원격연수 콘텐츠</h3><table class="table"><thead><tr><th>과목</th><th>차시</th></tr></thead><tbody>${REMOTE_CONTENTS.map(([t,c,code])=>`<tr><td><b>${esc(t)}</b><br><span style="color:#71809a;font-size:11px">${esc(c)} · ${esc(code)}</span></td><td>1</td></tr>`).join('')}</tbody></table>`);
      if(key==='evaluation')return openModal('평가 안내',`<h3>평가계획</h3><table class="table"><thead><tr><th>평가</th><th>배점</th></tr></thead><tbody><tr><td>서술형 평가</td><td>50점</td></tr><tr><td>논술평가</td><td>20점</td></tr><tr><td>개별 과제물</td><td>10점</td></tr><tr><td>개별 보고서</td><td>10점</td></tr><tr><td>근태평가</td><td>10점</td></tr><tr><td><b>합계</b></td><td><b>100점</b></td></tr></tbody></table><p>가산점은 평가관리 규정에 따라 0.5~1.0점이 적용될 수 있습니다.</p>`);
    }
    function showNotices(){
      openModal('공지사항',`<span class="modal-label">필독</span><h3>연수 전·중 확인 사항</h3><ul><li>본 안내는 운영계획을 바탕으로 제작되어 실제 운영 시 변경될 수 있습니다.</li><li>7.22.(수)~7.23.(목)은 현장체험연수입니다.</li><li>7.24.(금), 7.27.(월)은 실시간 비대면 연수입니다.</li><li>7.31.(금)은 논술평가, 8.6.(목)은 서술평가가 예정되어 있습니다.</li><li>원격 콘텐츠 6시간은 연수 기간 중 별도로 이수합니다.</li></ul>`);
    }
    function switchView(view){
      document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.querySelector(`#${view}View`).classList.remove('hidden');document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
      if(view==='all'){if(!state.calendarDate)state.calendarDate=state.selectedDate||chooseInitialDate();state.calendarMonth=state.calendarDate.slice(0,7);renderCalendar();renderCalendarList()}if(view==='guide')renderGuide();window.scrollTo({top:0,behavior:'smooth'});
    }
    function loadMeals(){
      const callbackName=`receiveMealData_${Date.now()}`,script=document.createElement('script');let done=false;
      const cleanup=()=>{if(done)return;done=true;delete window[callbackName];script.remove()};
      const timer=setTimeout(()=>{state.mealError='응답 시간 초과';state.mealLoaded=false;cleanup()},10000);
      window[callbackName]=(data)=>{clearTimeout(timer);const payload=data&&typeof data==='object'?data:{};state.meals=payload.meals||payload.meal||{};state.mealLoaded=payload.ok!==false&&Object.keys(state.meals||{}).length>0;state.mealError=state.mealLoaded?'':(payload.error||'식단 데이터 없음');state.mealUpdatedAt=payload.updatedAt||'';cleanup()};
      script.onerror=()=>{clearTimeout(timer);state.mealLoaded=false;state.mealError='데이터 요청 실패';cleanup()};
      script.src=`${MEAL_API_URL}?callback=${callbackName}&t=${Date.now()}`;document.head.appendChild(script);
    }

    document.addEventListener('click',e=>{const row=e.target.closest('[data-id]');if(row){const found=findItem(row.dataset.id);if(found)showDetail(found.day,found.item)}});
    document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>switchView(b.dataset.view));
    document.querySelector('#mealBtn').onclick=()=>showMeal(state.selectedDate||chooseInitialDate(),'lunch');
    document.querySelector('#noticeBtn').onclick=showNotices;
    document.querySelector('#modalClose').onclick=()=>modal.close();
    modal.addEventListener('click',e=>{if(e.target===modal)modal.close()});
    document.querySelector('#prevMonth').onclick=()=>changeMonth(-1);document.querySelector('#nextMonth').onclick=()=>changeMonth(1);

    state.selectedDate=chooseInitialDate();state.calendarDate=state.selectedDate;state.calendarMonth=state.selectedDate.slice(0,7);
    renderToday();renderCalendar();renderCalendarList();renderGuide();loadMeals();setInterval(loadMeals,REFRESH_MS);
  </script>
